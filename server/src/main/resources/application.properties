spring.application.name=server

# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/JDBC
spring.datasource.username=postgres
spring.datasource.password=8210
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate settings
spring.jpa.properties.hibernate.default_schema = E-commerce
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# configures the HikariCP connection pool (used by Spring Boot for database connections) to disable auto-commit mode for database transactions.
#Why use auto-commit=false?
#It gives you more control over transaction boundaries.
#It is essential for operations that need to be atomic (all-or-nothing), such as transferring money between accounts or updating multiple related tables.
# prevents Error: org.postgresql.util.PSQLException: Large Objects may not be used in auto-commit mode.
spring.datasource.hikari.auto-commit=false